# ============================================================
# AffordDexGrasp Dataset Reconstruction - Pipeline Configuration
# ============================================================

# --- Paths ---
paths:
  project_root: "./AffordDexGraspData"
  raw_data: "./data"
  dexgys: "./data/dexgys"
  oakink: "./data/oakink"
  mjcf: "./data/mjcf"
  processed: "./data_proc"
  scenes: "./scenes"
  textures: "./textures"
  renders: "./renders"
  pointclouds: "./pointclouds"
  semantics: "./semantics"
  splits: "./splits"
  final_dataset: "./final_dataset"

# --- DexGYS Dataset ---
dexgys:
  hf_repo: "wyl2077/DexGYS"
  train_file: "train_with_guide_v2.1.json"
  test_file: "test_with_guide_v2.1.json"
  grasp_dim: 28  # t(3) + axis_angle(3) + qpos(22)

# --- OakInk ---
oakink:
  hf_repo: "oakink/OakInk-v1"
  shape_files:
    - "metaV2.zip"
    - "OakInkObjectsV2.zip"
    - "OakInkVirtualObjectsV2.zip"
    - "oakink_shape_v2.zip"

# --- ShadowHand ---
shadow_hand:
  mjcf_url: "https://mirrors.pku.edu.cn/dl-release/UniDexGrasp_CVPR2023/"
  dof: 22
  total_grasp_params: 28  # t(3) + r(3) + q(22)
  # DexGraspNet 원본 hand model (Phase H에서 사용)
  # shadow_hand_wrist_free.xml: root=palm, 22 DOF, DexGYS grasp와 정확히 일치
  dexgraspnet_mjcf: "./data/mjcf_dexgraspnet"
  dexgraspnet_xml: "shadow_hand_wrist_free.xml"

# --- Scene Construction ---
scene:
  blender_path: /home/biyotteu/blender/blender-4.2.1-linux-x64/blender
  num_cameras: 5
  camera_layout:
    lateral_count: 4
    topdown_count: 1
    lateral_elevation_deg: 30  # degrees from horizontal
    lateral_azimuth_spacing_deg: 90  # equally spaced
    distance_from_center: 0.8  # meters
    topdown_height: 1.0  # meters above table
  table:
    size: [1.0, 1.0, 0.02]  # width, depth, height
    height: 0.75  # table top height
  physics:
    settle_steps: 500
    gravity: [0, 0, -9.81]

# --- Paint3D ---
# Paint3D는 Python 3.8 + PyTorch 1.12.1 + CUDA 11.3 환경 필요
# 메인 프로젝트(Python 3.10)와 호환 불가 → 별도 conda 환경에서 실행
paint3d:
  repo: "https://github.com/OpenTexture/Paint3D"
  clone_dir: "thirdparty/Paint3D"         # git clone 경로
  conda_env: "paint3d"                    # conda 환경 이름
  conda_python: null                      # 자동 감지 (conda run 사용). 직접 지정 시: "/path/to/envs/paint3d/bin/python"
  # Paint3D 원본 environment.yaml 기준 의존성:
  #   python=3.8.5, pytorch=1.12.1, cudatoolkit=11.3
  #   kaolin==0.13.0, diffusers==0.25.0, trimesh, xatlas 등
  kaolin_version: "0.13.0"
  kaolin_wheel_url: "https://nvidia-kaolin.s3.us-east-2.amazonaws.com/torch-1.12.1_cu113.html"
  texture_resolution: 2048                # 2K UV maps
  min_texture_size: 512                   # 이 크기 미만의 material_*.png는 더미로 간주
  # Paint3D config 경로 (clone_dir 기준 상대경로)
  # Stage 1 (coarse): depth-conditioned inpainting
  sd_config_stage1: "controlnet/config/depth_based_inpaint_template.yaml"
  # Stage 2 (refine): UV-position-conditioned refinement
  sd_config_stage2: "controlnet/config/UV_based_inpaint_template.yaml"
  render_config: "paint3d/config/train_config_paint3d.py"
  # HuggingFace pretrained 모델 (첫 실행 시 자동 다운로드됨)
  # - runwayml/stable-diffusion-v1-5
  # - lllyasviel/control_v11f1p_sd15_depth
  # - lllyasviel/control_v11p_sd15_inpaint
  # - lllyasviel/control_v11f1e_sd15_tile
  # - GeorgeQi/Paint3d_UVPos_Control
  # - GeorgeQi/realisticVisionV13_v13

# --- MLLM ---
mllm:
  # Qwen3-VL-32B: BF16 ~64GB VRAM, fits 96GB GPU without quantization
  # MMMU 76.0 (GPT-4o 69.1 대비 +6.9), Qwen2.5-VL-72B급 성능에 파라미터 절반
  model_name: "Qwen/Qwen3-VL-32B-Instruct"
  quantization: null  # no quantization needed for 96GB GPU
  max_tokens: 2048
  temperature: 0.1
  num_rgb_views: 1  # vlm이 보는 사진 수 
  semantic_attrs:
    - "object_category"
    - "intention"
    - "contact_parts"
    - "grasp_direction"

# --- Affordance GT ---
affordance:
  num_object_points: 4096
  num_hand_surface_points: 2048  # per grasp
  knn_neighbors: 20  # for Gaussian smoothing
  score_method: "gaussian"  # exp(-d/sigma)

# --- Open-set Split ---
open_set:
  num_splits: 2  # A and B
  unseen_ratio: 0.2  # 20% categories as unseen
  seen_train_ratio: 0.8  # 80% of seen objects for train
  seed: 42

# --- Rendering ---
rendering:
  image_width: 640
  image_height: 480
  lens_mm: 50  # camera lens focal length
  depth_format: "exr"  # or "png16"
  use_segmentation: true
  render_samples: 128  # Blender cycles samples

# --- Point Cloud ---
pointcloud:
  voxel_size: 0.002  # 2mm voxel for downsampling
  num_final_points: 4096
  remove_table: true
  outlier_nb_neighbors: 20
  outlier_std_ratio: 2.0

# --- Subprocess Timeouts (초) ---
timeouts:
  blenderproc_scene: 300   # Phase D physics settle
  paint3d: 600             # Phase E texture generation
  uv_unwrap: 60            # Phase E UV unwrap
  blenderproc_render: 600  # Phase F rendering
  mllm_inference: 120      # Phase G MLLM per sample
